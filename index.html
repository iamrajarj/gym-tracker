<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Gym Tracker</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111">
</head>

<body>

<div class="container">

<h1>🏋️ Gym Tracker</h1>

<div class="top-bar">
<button id="darkToggle">🌙 Dark Mode</button>
<button id="exportBtn">📤 Export</button>
<label class="importBtn">
📥 Import
<input type="file" id="importFile" hidden>
</label>
</div>

<div class="stats">
<div>🔥 Gym Days: <span id="streak">0</span></div>
<div>📊 Weekly Progress: <span id="progress">0%</span></div>
</div>

<!-- WEEKLY TRACKER -->
<div class="card">
<h2>📅 Weekly Tracker</h2>

<table>
<thead>
<tr>
<th>Habit</th>
<th>Mon</th>
<th>Tue</th>
<th>Wed</th>
<th>Thu</th>
<th>Fri</th>
<th>Sat</th>
<th>Sun</th>
</tr>
</thead>

<tbody>

<tr>
<td>Gym</td>
<td><input type="checkbox" class="gym" data-task="gym" data-day="0"></td>
<td><input type="checkbox" class="gym" data-task="gym" data-day="1"></td>
<td><input type="checkbox" class="gym" data-task="gym" data-day="2"></td>
<td class="off">OFF</td>
<td><input type="checkbox" class="gym" data-task="gym" data-day="4"></td>
<td><input type="checkbox" class="gym" data-task="gym" data-day="5"></td>
<td class="off">OFF</td>
</tr>

<tr>
<td>Sleep</td>
<td><input type="checkbox" class="habit" data-task="sleep" data-day="0"></td>
<td><input type="checkbox" class="habit" data-task="sleep" data-day="1"></td>
<td><input type="checkbox" class="habit" data-task="sleep" data-day="2"></td>
<td><input type="checkbox" class="habit" data-task="sleep" data-day="3"></td>
<td><input type="checkbox" class="habit" data-task="sleep" data-day="4"></td>
<td><input type="checkbox" class="habit" data-task="sleep" data-day="5"></td>
<td><input type="checkbox" class="habit" data-task="sleep" data-day="6"></td>
</tr>

<tr>
<td>Protein</td>
<td><input type="checkbox" class="habit" data-task="protein" data-day="0"></td>
<td><input type="checkbox" class="habit" data-task="protein" data-day="1"></td>
<td><input type="checkbox" class="habit" data-task="protein" data-day="2"></td>
<td><input type="checkbox" class="habit" data-task="protein" data-day="3"></td>
<td><input type="checkbox" class="habit" data-task="protein" data-day="4"></td>
<td><input type="checkbox" class="habit" data-task="protein" data-day="5"></td>
<td><input type="checkbox" class="habit" data-task="protein" data-day="6"></td>
</tr>

</tbody>
</table>

</div>

<!-- NOTES -->
<div class="card">
<h2>📝 Weekly Notes</h2>
<textarea id="notes" placeholder="Write PRs, weight, diet notes..."></textarea>
</div>

<!-- HEATMAP -->
<div class="card heatmap-card">
<h2>📅 Activity Heatmap</h2>
<div class="heatmap-wrapper">
  <div class="heatmap-months" id="heatmapMonths"></div>
  <div class="heatmap-body">
    <div class="heatmap-row-labels">
      <span>Mon</span>
      <span></span>
      <span>Wed</span>
      <span></span>
      <span>Fri</span>
      <span></span>
      <span>Sun</span>
    </div>
    <div class="heatmap-container">
      <div id="heatmap" class="heatmap-grid"></div>
    </div>
  </div>
  <div class="heatmap-legend">
    <span class="heatmap-legend-label">Less</span>
    <span class="heatmap-key level-0"></span>
    <span class="heatmap-key level-1"></span>
    <span class="heatmap-key level-2"></span>
    <span class="heatmap-key level-3"></span>
    <span class="heatmap-legend-label">More</span>
  </div>
</div>
</div>

</div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
